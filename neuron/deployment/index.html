<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Houston Real Estate Predictor</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 350px; }
        h2 { text-align: center; color: #333; margin-top: 0; }
        label { font-weight: bold; margin-top: 10px; display: block; font-size: 14px; color: #555; }
        input { width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #0056b3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #004494; }
        .result { margin-top: 20px; text-align: center; font-size: 1.5em; font-weight: bold; color: #28a745; }
        .warning { margin-top: 15px; color: #dc3545; font-size: 0.9em; text-align: center; padding: 10px; background-color: #f8d7da; border-radius: 4px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Houston Home Pricer</h2>
        
        <label for="beds">Bedrooms</label>
        <input type="number" id="beds" value="4" min="1">
        
        <label for="baths">Bathrooms</label>
        <input type="number" id="baths" value="2" min="1">
        
        <label for="sqft">Square Footage</label>
        <input type="number" id="sqft" value="2500" min="500">
        
        <label for="zip_code">Zip Code</label>
        <input type="number" id="zip_code" value="77494">
        
        <button onclick="predictPrice()">Predict Price</button>
        
        <div id="price-result" class="result"></div>
        <div id="warning-message" class="warning"></div>
    </div>

    <script>
        async function predictPrice() {
            const beds = document.getElementById('beds').value;
            const baths = document.getElementById('baths').value;
            const sqft = document.getElementById('sqft').value;
            const zip_code = document.getElementById('zip_code').value;
            
            const resultDiv = document.getElementById('price-result');
            const warningDiv = document.getElementById('warning-message');
            
            resultDiv.innerText = "Calculating...";
            resultDiv.style.color = "#333";
            warningDiv.style.display = "none";
            warningDiv.innerText = "";

            try {
                const response = await fetch('http://127.0.0.1:8000/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        beds: parseInt(beds),
                        baths: parseInt(baths),
                        sqft: parseInt(sqft),
                        zip_code: parseInt(zip_code)
                    })
                });

                const data = await response.json();
                
                // Format the float into USD currency
                const formattedPrice = new Intl.NumberFormat('en-US', {
                    style: 'currency',
                    currency: 'USD'
                }).format(data.predicted_price);

                resultDiv.innerText = formattedPrice;
                resultDiv.style.color = "#28a745";
                
                // Display warning block if the API returns one
                if (data.warning) {
                    warningDiv.innerText = data.warning;
                    warningDiv.style.display = "block";
                }

            } catch (error) {
                resultDiv.innerText = "Server Error";
                resultDiv.style.color = "#dc3545";
                warningDiv.innerText = "Ensure your FastAPI server is running on port 8000.";
                warningDiv.style.display = "block";
            }
        }
    </script>
</body>
</html>
